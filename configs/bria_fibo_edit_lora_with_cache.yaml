# =============================================================================
# briaai/fibo-edit — Image Editing LoRA fine-tuning (with embedding cache)
# =============================================================================
# Fine-tunes the Bria FIBO Edit transformer with LoRA adapters.
# Uses source (control) image + text prompt to guide editing.
#
# Model: https://huggingface.co/briaai/fibo-edit
# Architecture: BriaFiboTransformer2DModel (shared with FIBO T2I),
#               AutoencoderKLWan (vae_scale_factor=16),
#               SmolLM3 text encoder, FlowMatchEulerDiscreteScheduler
#               Source image packed & concatenated along sequence dim
#
# Dataset layout:
#   training_images/sample_001.{png,txt}   ← target image + caption
#   control_images/sample_001.png          ← source/reference image
# =============================================================================

trainer: BriaFiboEdit

model:
  pretrained_model_name_or_path: "briaai/fibo-edit"
  # For offline use:
  # pretrained_model_name_or_path: "/your/model/dir/fibo-edit"

  lora:
    r: 16
    lora_alpha: 16
    init_lora_weights: "gaussian"
    target_modules: ["to_k", "to_q", "to_v", "to_out.0"]
    pretrained_weight: null

  quantize: false

data:
  class_path: "qflux.data.dataset.ImageDataset"
  init_args:
    dataset_path: "/path/to/your/local/dataset"
    caption_dropout_rate: 0.05
    cache_dir: ${cache.cache_dir}
    use_cache: ${cache.use_cache}
    processor:
      class_path: "qflux.data.preprocess.ImageProcessor"
      init_args:
        process_type: center_crop
        target_size: [1024, 1024]
  batch_size: 1
  num_workers: 2
  shuffle: true

logging:
  output_dir: "/path/to/output/bria-fibo-edit-lora"
  report_to: "tensorboard"
  tracker_project_name: "bria_fibo_edit_lora"

optimizer:
  class_path: bitsandbytes.optim.Adam8bit
  init_args:
    lr: 0.0001
    betas: [0.9, 0.999]

lr_scheduler:
  scheduler_type: "constant"
  warmup_steps: 100

train:
  gradient_accumulation_steps: 4
  max_train_steps: 5000
  num_epochs: 10
  checkpointing_steps: 500
  checkpoints_total_limit: 5
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  gradient_checkpointing: true

cache:
  use_cache: true
  cache_dir: "/path/to/cache/bria-fibo-edit"
  devices:
    vae: cuda:0
    text_encoder: cuda:0

predict:
  devices:
    vae: cuda:0
    text_encoder: cuda:0
    dit: cuda:0

resume: null

validation:
  enabled: false
  steps: 500
  max_samples: 4
