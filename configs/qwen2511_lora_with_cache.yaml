# =============================================================================
# Qwen/Qwen-Image-Edit-2511 — LoRA fine-tuning WITH embedding cache
# =============================================================================
# RECOMMENDED mode. Build the cache first, then train:
#
#   Step 1 – build cache (runs VAE + text encoder once, saves to disk):
#     CUDA_VISIBLE_DEVICES=0 python -m qflux.main \
#         --config configs/qwen2511_lora_with_cache.yaml --cache
#
#   Step 2 – train (only the DIT transformer + cached embeddings loaded):
#     CUDA_VISIBLE_DEVICES=0 accelerate launch \
#         --config_file accelerate_config.yaml \
#         -m qflux.main --config configs/qwen2511_lora_with_cache.yaml
#
# Why use cache? ~2-3x faster per iteration because VAE and text encoder are
# pre-computed once and stored on disk; training loads them directly.
# =============================================================================

trainer: QwenImageEditPlus

model:
  # HuggingFace model ID (requires internet the first time; cached afterwards):
  pretrained_model_name_or_path: "Qwen/Qwen-Image-Edit-2511"
  # For offline / local model, replace with the downloaded folder path:
  # pretrained_model_name_or_path: "/path/to/local/Qwen-Image-Edit-2511"
  # For offline text encoder (Qwen2.5-VL-7B-Instruct is loaded separately):
  # pretrained_embeddings:
  #   text_encoder: "/path/to/local/Qwen2.5-VL-7B-Instruct"
  quantize: false
  lora:
    r: 16                             # LoRA rank (8 / 16 / 32 / 64)
    lora_alpha: 16                    # usually equal to r
    init_lora_weights: "gaussian"
    target_modules: ["to_k", "to_q", "to_v", "to_out.0"]
    pretrained_weight: null           # resume from existing LoRA: "/path/to/lora.safetensors"

data:
  class_path: "qflux.data.dataset.ImageDataset"
  init_args:
    # ── Option A: local dataset ──────────────────────────────────────────────
    dataset_path: "/path/to/your/local/dataset"
    # Expected directory layout:
    #   /path/to/your/local/dataset/
    #     training_images/
    #       sample_001.png      ← target image
    #       sample_001.txt      ← caption / prompt
    #     control_images/
    #       sample_001.png      ← control / reference image (same stem)
    #       sample_001_mask.png ← optional edit mask

    # ── Option B: HuggingFace dataset ───────────────────────────────────────
    # dataset_path:
    #   - split: train
    #     repo_id: TsienDragon/face_segmentation_20

    caption_dropout_rate: 0.05
    prompt_image_dropout_rate: 0.05
    cache_dir: ${cache.cache_dir}     # automatically wired from cache section
    use_cache: ${cache.use_cache}
    cache_drop_rate: 0.1              # 10% chance of using empty prompt during training
    processor:
      class_path: "qflux.data.preprocess.ImageProcessor"
      init_args:
        process_type: center_crop
        target_size: [1024, 1024]
        controls_size: [[1024, 1024]]
  batch_size: 1
  num_workers: 2
  shuffle: true

logging:
  output_dir: "/path/to/output/qwen2511-lora-cache"
  report_to: "tensorboard"
  tracker_project_name: "qwen2511_lora_with_cache"

optimizer:
  class_path: bitsandbytes.optim.Adam8bit
  init_args:
    lr: 0.0001
    betas: [0.9, 0.999]

lr_scheduler:
  scheduler_type: "cosine"
  warmup_steps: 50
  num_cycles: 0.5
  power: 1.0

train:
  gradient_accumulation_steps: 1
  max_train_steps: 6000
  num_epochs: 100
  checkpointing_steps: 200
  checkpoints_total_limit: 10
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  gradient_checkpointing: true

cache:
  use_cache: true
  cache_dir: "/path/to/cache/qwen2511-lora-cache"
  devices:
    vae: cuda:0
    text_encoder: cuda:0

predict:
  devices:
    vae: cuda:0
    text_encoder: cuda:0
    dit: cuda:0

resume: null

validation:
  enabled: false
  steps: 200
  max_samples: 4
