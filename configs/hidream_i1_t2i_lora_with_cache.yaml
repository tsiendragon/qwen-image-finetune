trainer: HiDreamI1T2I

model:
  pretrained_model_name_or_path: HiDream-ai/HiDream-I1-Full
  quantize: false
  lora:
    r: 16
    lora_alpha: 16
    init_lora_weights: gaussian
    target_modules: [to_k, to_q, to_v, to_out.0]
    pretrained_weight: null
    adapter_name: lora_hidream_i1_t2i

data:
  class_path: qflux.data.dataset.ImageDataset
  init_args:
    dataset_path: null
    caption_dropout_rate: 0.1
    processor:
      class_path: qflux.data.preprocess.ImageProcessor
      init_args:
        process_type: center_crop
        target_size: [1024, 1024]
  batch_size: 1
  num_workers: 2
  shuffle: true

logging:
  output_dir: /tmp/hidream_i1_t2i/
  report_to: tensorboard
  tracker_project_name: hidream_i1_t2i

optimizer:
  class_path: torch.optim.AdamW
  init_args:
    lr: 0.0001
    betas: [0.9, 0.999]

lr_scheduler:
  scheduler_type: constant
  warmup_steps: 100

train:
  gradient_accumulation_steps: 1
  max_train_steps: 1000
  checkpointing_steps: 200
  max_grad_norm: 1.0
  mixed_precision: bf16
  gradient_checkpointing: true

resume: null

cache:
  devices:
    vae: cuda:0
    text_encoder: cuda:0
  cache_dir: /tmp/hidream_i1_t2i/cache
  use_cache: true

predict:
  devices:
    vae: cuda:0
    text_encoder: cuda:0
    dit: cuda:0

validation:
  enabled: false
  steps: 200
  max_samples: 1
