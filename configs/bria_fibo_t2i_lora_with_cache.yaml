# =============================================================================
# briaai/FIBO — Text-to-Image LoRA fine-tuning (with embedding cache)
# =============================================================================
# Fine-tunes the Bria FIBO transformer with LoRA adapters.
# No control/reference image; generates images from text only.
#
# Model: https://huggingface.co/briaai/FIBO
# Architecture: BriaFiboTransformer2DModel, AutoencoderKLWan (vae_scale_factor=16),
#               SmolLM3 text encoder (last 2 layers cat, per-layer conditioning),
#               FlowMatchEulerDiscreteScheduler
#
# Commands:
#   Step 1 – build embedding cache:
#     CUDA_VISIBLE_DEVICES=0 python -m qflux.main \
#         --config configs/bria_fibo_t2i_lora_with_cache.yaml --cache
#
#   Step 2 – train:
#     CUDA_VISIBLE_DEVICES=0 accelerate launch \
#         --config_file accelerate_config.yaml \
#         -m qflux.main --config configs/bria_fibo_t2i_lora_with_cache.yaml
#
# Note: text_encoder_layers (all hidden states) are re-run at training time
# even when cache is enabled — text encoder must remain on GPU during training.
# =============================================================================

trainer: BriaFiboT2I

model:
  pretrained_model_name_or_path: "briaai/FIBO"
  # For offline use:
  # pretrained_model_name_or_path: "/your/model/dir/FIBO"

  lora:
    r: 16
    lora_alpha: 16
    init_lora_weights: "gaussian"
    target_modules: ["to_k", "to_q", "to_v", "to_out.0"]
    pretrained_weight: null

  quantize: false

data:
  class_path: "qflux.data.dataset.ImageDataset"
  init_args:
    dataset_path: "/path/to/your/local/dataset"
    caption_dropout_rate: 0.05
    cache_dir: ${cache.cache_dir}
    use_cache: ${cache.use_cache}
    processor:
      class_path: "qflux.data.preprocess.ImageProcessor"
      init_args:
        process_type: center_crop
        target_size: [1024, 1024]
  batch_size: 1
  num_workers: 2
  shuffle: true

logging:
  output_dir: "/path/to/output/bria-fibo-t2i-lora"
  report_to: "tensorboard"
  tracker_project_name: "bria_fibo_t2i_lora"

optimizer:
  class_path: bitsandbytes.optim.Adam8bit
  init_args:
    lr: 0.0001
    betas: [0.9, 0.999]

lr_scheduler:
  scheduler_type: "constant"
  warmup_steps: 100

train:
  gradient_accumulation_steps: 4
  max_train_steps: 5000
  num_epochs: 10
  checkpointing_steps: 500
  checkpoints_total_limit: 5
  max_grad_norm: 1.0
  mixed_precision: "bf16"
  gradient_checkpointing: true

cache:
  use_cache: true
  cache_dir: "/path/to/cache/bria-fibo-t2i"
  devices:
    vae: cuda:0
    text_encoder: cuda:0

predict:
  devices:
    vae: cuda:0
    text_encoder: cuda:0
    dit: cuda:0

resume: null

validation:
  enabled: false
  steps: 500
  max_samples: 4
